apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: board-service-ingress
  namespace: board-service
  annotations:
    # AWS ALB Ingress Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # Redirect HTTP to HTTPS
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Health check settings
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # Tags
    alb.ingress.kubernetes.io/tags: "Project=board-service,Environment=production"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # API routes → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: board-backend-service
                port:
                  number: 8080
          # Health check route → backend
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: board-backend-service
                port:
                  number: 8080
          # All other routes → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: board-frontend-service
                port:
                  number: 80
